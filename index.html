<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Inside City Armory | متجر أسلحة انسايد ستي</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #0a0a0a; color: #eee; margin: 0; padding: 0; text-align: center; }
        header { background: #1a1a1a; padding: 25px; border-bottom: 3px solid #d32f2f; }
        header h1 { color: #d32f2f; margin: 0; letter-spacing: 2px; }

        .container { max-width: 450px; margin: 50px auto; background: #151515; padding: 30px; border-radius: 15px; border: 1px solid #252525; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #d32f2f; margin-bottom: 10px; }
        .price-tag { background: #d32f2f; color: white; padding: 10px; border-radius: 8px; font-weight: bold; margin: 15px 0; font-size: 1.2rem; }
        
        input { width: 90%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 5px; text-align: center; font-size: 1rem; }
        
        .btn-submit { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 5px; background: #d32f2f; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-submit:hover { background: #ff0000; box-shadow: 0 0 15px rgba(211, 47, 47, 0.4); }

        .support-text { margin-top: 15px; font-size: 0.85rem; color: #bbb; }
        .support-text span { color: #d32f2f; font-weight: bold; }

        #weapons-menu { display: none; padding: 40px; max-width: 1100px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 12px; transition: 0.3s; position: relative; }
        .card:hover { border-color: #d32f2f; transform: translateY(-5px); }
        .price { color: #ffca28; font-weight: bold; font-size: 1.3rem; margin-top: 10px; }
        .btn-buy { background: #2e7d32; color: white; border: none; padding: 8px 15px; border-radius: 5px; margin-top: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        
        /* نافذة الشراء المنبثقة */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: #151515; margin: 10% auto; padding: 25px; border: 1px solid #d32f2f; width: 350px; border-radius: 15px; }

        footer { margin-top: 50px; color: #444; font-size: 0.8rem; padding-bottom: 20px; }
    </style>
</head>
<body>

<header><h1>INSIDE CITY ARMORY</h1></header>

<div id="request-screen" class="container">
    <h2>📜 طلب تصريح دخول</h2>
    <div class="price-tag">قيمة التصريح: 850€</div>
    <input type="email" id="req-email" placeholder="أدخل إيميلك الشخصي" required>
    <input type="text" id="req-discord" placeholder="يوزر الديسكورد" required>
    <button class="btn-submit" onclick="sendToDiscord('request')">ارسال النموذج</button>
    <div class="support-text">في حال واجهت مشكلة توجه مباشرة إلى <span>سعود</span> اليوزر: <span>dr7_511</span></div>
    
    <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
        <input type="text" id="access-code" placeholder="كود القبول">
        <button class="btn-submit" onclick="unlockStore()" style="background: #2e7d32;">دخول المتجر</button>
    </div>
</div>

<div id="weapons-menu">
    <h2 style="color: #d32f2f; margin-bottom: 30px;">متجر أسلحة انسايد ستي</h2>
    <div class="grid">
        <div class="card"><h3>M24</h3><p class="price">3,200€</p><button class="btn-buy" onclick="openBuy('M24')">شراء الأن</button></div>
        <div class="card"><h3>G36</h3><p class="price">3,000€</p><button class="btn-buy" onclick="openBuy('G36')">شراء الأن</button></div>
        <div class="card"><h3>AK47</h3><p class="price">2,300€</p><button class="btn-buy" onclick="openBuy('AK47')">شراء الأن</button></div>
        <div class="card"><h3>قنبلة لاصقة</h3><p class="price">2,000€</p><button class="btn-buy" onclick="openBuy('قنبلة لاصقة')">شراء الأن</button></div>
        <div class="card"><h3>MP5</h3><p class="price">780€</p><button class="btn-buy" onclick="openBuy('MP5')">شراء الأن</button></div>
        <div class="card"><h3>ماك 10</h3><p class="price">500€</p><button class="btn-buy" onclick="openBuy('ماك 10')">شراء الأن</button></div>
        <div class="card"><h3>P99</h3><p class="price">60€</p><button class="btn-buy" onclick="openBuy('P99')">شراء الأن</button></div>
        <div class="card"><h3>سكين</h3><p class="price">مجاني</p><button class="btn-buy" onclick="openBuy('سكين')">شراء الأن</button></div>
    </div>
</div>

<div id="buyModal" class="modal">
    <div class="modal-content">
        <h3 id="weaponTitle" style="color: #d32f2f;">شراء سلاح</h3>
        <input type="text" id="buy-discord" placeholder="يوزرك دس" required>
        <input type="text" id="buy-roblox" placeholder="يوزرك روبلوكس" required>
        <input type="text" id="buy-id" placeholder="ايديك ديسكورد" required>
        <button class="btn-submit" onclick="sendToDiscord('buy')">تأكيد الشراء</button>
        <button onclick="closeBuy()" style="background:none; border:none; color:#888; cursor:pointer; margin-top:10px;">إلغاء</button>
    </div>
</div>

<script>
    const webhookURL = "https://discord.com/api/webhooks/1464045319414218782/ffUEwKy9mG_tfbpFAA-6Q8rTYE5AqmI33jfzfy3KALH2BOZ6_Nz7ctplWt7bjnNHauK-";
    let selectedWeapon = "";

    function unlockStore() {
        if(document.getElementById('access-code').value === "SA") {
            document.getElementById('request-screen').style.display = 'none';
            document.getElementById('weapons-menu').style.display = 'block';
        } else { alert("كود القبول خاطئ!"); }
    }

    function openBuy(weaponName) {
        selectedWeapon = weaponName;
        document.getElementById('weaponTitle').innerText = "طلب شراء: " + weaponName;
        document.getElementById('buyModal').style.display = 'block';
    }

    function closeBuy() { document.getElementById('buyModal').style.display = 'none'; }

    function sendToDiscord(type) {
        let content = "";
        if (type === 'request') {
            const email = document.getElementById('req-email').value;
            const discord = document.getElementById('req-discord').value;
            if(!email || !discord) return alert("يرجى تعبئة البيانات");
            content = `📜 **طلب تصريح جديد**\n📧 الإيميل: ${email}\n🎮 الديسكورد: ${discord}`;
        } else {
            const dsc = document.getElementById('buy-discord').value;
            const roblox = document.getElementById('buy-roblox').value;
            const id = document.getElementById('buy-id').value;
            if(!dsc || !roblox || !id) return alert("يرجى تعبئة البيانات");
            content = `🛒 **طلب شراء سلاح**\n🔫 السلاح: ${selectedWeapon}\n👤 يوزر دس: ${dsc}\n🎮 يوزر روبلوكس: ${roblox}\n🆔 ايدي دس: ${id}`;
        }

        fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: content })
        }).then(() => {
            alert("تم إرسال الطلب بنجاح!");
            closeBuy();
        }).catch(() => alert("حدث خطأ في الإرسال"));
    }
</script>
</body>
</html>
